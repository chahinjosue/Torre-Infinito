<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Torre Infinito — Amueblamiento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #0a0a0f; }
    #root { min-height: 100dvh; }
    
@import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
body{font-family:'Geist',-apple-system,sans-serif;background:#0a0a0f;color:#f0f0f5;min-height:100dvh;overscroll-behavior-y:auto;-webkit-overflow-scrolling:touch;}
::-webkit-scrollbar{width:0;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}

.app{max-width:600px;margin:0 auto;padding-bottom:100px;}

/* HEADER */
.hd{background:#0a0a0f;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,0.05);}
.hd-inner{padding:14px 16px 12px;}
.hd-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.hd-titles{flex:1;min-width:0;}
.hd-eyebrow{font-size:9.5px;font-weight:500;letter-spacing:1.8px;text-transform:uppercase;color:#4a4a60;margin-bottom:1px;}
.hd-title{font-size:17px;font-weight:700;letter-spacing:-0.4px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hd-title span{background:linear-gradient(90deg,#4f7fff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ring-block{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.ring-wrap{width:46px;height:46px;position:relative;flex-shrink:0;}
.ring-svg{display:block;transform:rotate(-90deg);}
.ring-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;}
.pct-col{display:flex;flex-direction:column;}
.pct-big{font-size:26px;font-weight:800;letter-spacing:-1.5px;color:#fff;line-height:1;}
.pct-sub{font-size:10px;color:#8585a0;margin-top:2px;}
.prog-bar{height:3px;background:#1c1c27;border-radius:3px;overflow:hidden;margin-bottom:10px;}
.prog-fill{height:100%;background:linear-gradient(90deg,#4f7fff,#a855f7);border-radius:3px;transition:width .7s cubic-bezier(.4,0,.2,1);}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.metric{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.05);border-radius:10px;padding:7px 8px;text-align:center;}
.metric-lbl{font-size:8px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#4a4a60;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.metric-val{font-size:13px;font-weight:700;color:#fff;letter-spacing:-.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.metric-val.g{color:#00d67a;}
.metric-val.b{color:#4f7fff;}
.metric-val.r{color:#ff4d6a;}

/* SECTION LABEL */
.sec-divider{padding:12px 16px 8px;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#4a4a60;}

/* SECTION CARD */
.sec-card{background:#16161f;border:1px solid rgba(255,255,255,0.08);border-radius:16px;margin:0 16px 10px;overflow:visible;transition:border-color .2s;}
.sec-card.open{border-color:rgba(168,85,247,0.5);}
.sec-card.complete{border-color:rgba(0,214,122,0.25);}
.sec-hdr{display:flex;align-items:center;padding:16px;gap:12px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;border-radius:16px 16px 0 0;}
.sec-card.open .sec-hdr{background:linear-gradient(90deg,rgba(79,127,255,0.14),rgba(168,85,247,0.1) 60%,transparent);border-radius:16px 16px 0 0;}
.sec-icon{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s;}
.sec-card.open .sec-icon{background:linear-gradient(135deg,rgba(79,127,255,0.22),rgba(168,85,247,0.22));border-color:rgba(168,85,247,0.35);}
.sec-card.complete .sec-icon{background:rgba(0,214,122,0.12);border-color:rgba(0,214,122,0.2);}
.sec-meta{flex:1;min-width:0;}
.sec-name{font-size:15px;font-weight:600;letter-spacing:-.2px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;transition:all .2s;}
.sec-card.open .sec-name{background:linear-gradient(90deg,#818cf8,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sec-sub{font-size:12px;color:#4a4a60;}
.sec-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.mini-ring{position:relative;width:38px;height:38px;}
.mini-ring-svg{display:block;transform:rotate(-90deg);}
.mini-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#8585a0;}
.sec-dots-btn{background:none;border:none;cursor:pointer;padding:6px 5px;border-radius:8px;color:#4a4a60;display:flex;flex-direction:column;align-items:center;gap:2.5px;transition:color .15s,background .15s;}
.sec-dots-btn:hover{color:#8585a0;background:rgba(255,255,255,0.07);}
.dot{width:3.5px;height:3.5px;border-radius:50%;background:currentColor;display:block;}
.sec-bar{height:2px;background:#1c1c27;margin:0 16px 0;border-radius:2px;overflow:hidden;}
.sec-bar-fill{height:100%;background:linear-gradient(90deg,#4f7fff,#a855f7);border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.sec-budget-strip{display:flex;gap:8px;padding:10px 16px 12px;flex-wrap:wrap;}
.sec-bud-chip{display:flex;align-items:center;gap:6px;background:#1c1c27;border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:5px 10px;}
.sec-bud-chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sec-bud-chip-lbl{font-size:10px;font-weight:500;color:#8585a0;text-transform:uppercase;letter-spacing:.5px;}
.sec-bud-chip-val{font-size:13px;font-weight:700;letter-spacing:-.3px;}


/* SECTION BODY */
.sec-body{border-top:1px solid rgba(255,255,255,0.05);}
.sub-lbl-row{display:flex;align-items:center;padding:14px 16px 6px;gap:8px;}
.sub-lbl{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:1.8px;color:#4a4a60;flex:1;}
.sub-lbl-btn{background:none;border:none;cursor:pointer;padding:3px 7px;border-radius:6px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:4px;transition:background .15s,color .15s;}
.sub-lbl-btn.add{color:#4f7fff;background:rgba(79,127,255,0.08);}
.sub-lbl-btn.add:hover{background:rgba(79,127,255,0.18);}
.sub-lbl-btn.del{color:#4a4a60;}
.sub-lbl-btn.del:hover{color:#ff4d6a;background:rgba(255,77,106,0.12);}
.add-group-row{display:flex;gap:8px;padding:8px 16px 10px;background:#111118;border-top:1px solid rgba(255,255,255,0.05);}
.add-group-input{flex:1;background:#16161f;border:1px solid rgba(255,255,255,0.08);border-radius:10px;font-family:'Geist',-apple-system,sans-serif;font-size:16px;color:#f0f0f5;padding:9px 12px;outline:none;}
.add-group-input::placeholder{color:#4a4a60;}
.add-group-btn{background:rgba(168,85,247,0.15);border:none;border-radius:10px;color:#a855f7;font-family:'Geist',-apple-system,sans-serif;font-size:12px;font-weight:600;padding:0 14px;cursor:pointer;}

/* ITEM */
.item-outer{border-bottom:1px solid rgba(255,255,255,0.05);}
.item-outer:last-of-type{border-bottom:none;}
.item-row{display:flex;align-items:flex-start;padding:12px 16px;gap:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .12s;}
.item-row:hover{background:rgba(255,255,255,0.04);}
.item-handle{display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;flex-shrink:0;}
.handle-btn{background:none;border:none;cursor:pointer;padding:5px 4px;border-radius:6px;color:#4a4a60;display:flex;flex-direction:column;align-items:center;gap:2.5px;transition:color .15s,background .15s;}
.handle-btn:hover{color:#8585a0;background:rgba(255,255,255,0.07);}
.item-body{flex:1;min-width:0;}
.item-name{font-size:13.5px;font-weight:400;color:#f0f0f5;line-height:1.4;transition:color .2s;}
.item-row.done .item-name{color:#4a4a60;text-decoration:line-through;text-decoration-color:#4a4a60;}
.item-prices{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center;}
.pf{display:flex;align-items:center;gap:5px;background:#1c1c27;border:1px solid rgba(255,255,255,0.08);border-radius:7px;padding:4px 9px;transition:border-color .15s,box-shadow .15s;}
.pf:focus-within{background:rgba(255,255,255,0.07);border-color:rgba(79,127,255,0.4);box-shadow:0 0 0 3px rgba(79,127,255,0.08);}
.pf-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;}
.pf-tag.b{color:#4f7fff;}
.pf-tag.p{color:#00d67a;}
.pf-cur{font-size:11px;color:#4a4a60;font-weight:500;}
.pf-input{border:none;background:transparent;font-family:'Geist',-apple-system,sans-serif;font-size:16px;font-weight:600;color:#f0f0f5;width:86px;outline:none;padding:0;transform:scale(0.75);transform-origin:left center;margin-right:-18px;}
.pf-input::placeholder{color:#4a4a60;font-weight:400;}
.diff-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:50px;}
.diff-badge.save{background:rgba(0,214,122,0.12);color:#00d67a;}
.diff-badge.over{background:rgba(255,77,106,0.12);color:#ff4d6a;}
.chk{width:20px;height:20px;border-radius:6px;border:1.5px solid #4a4a60;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1);}
.item-row.done .chk{background:#00d67a;border-color:#00d67a;transform:scale(1.05);}

/* ADD ITEM */
.add-zone{padding:8px 16px 10px;background:#111118;border-top:1px solid rgba(255,255,255,0.05);}
.add-row{display:flex;gap:8px;}
.add-input{flex:1;background:#16161f;border:1px solid rgba(255,255,255,0.08);border-radius:10px;font-family:'Geist',-apple-system,sans-serif;font-size:16px;color:#f0f0f5;padding:10px 12px;outline:none;transition:border-color .15s,box-shadow .15s;}
.add-input::placeholder{color:#4a4a60;}
.add-input:focus{border-color:rgba(79,127,255,0.5);box-shadow:0 0 0 3px rgba(79,127,255,0.1);}
.add-btn{background:#4f7fff;border:none;border-radius:10px;color:#fff;font-family:'Geist',-apple-system,sans-serif;font-size:13px;font-weight:600;padding:0 16px;cursor:pointer;transition:opacity .15s;}
.add-btn:hover{opacity:.88;}

/* FAB */
.weights-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px);}
.weights-sheet{background:#16161f;border:1px solid rgba(255,255,255,0.08);border-radius:24px 24px 0 0;width:100%;max-width:600px;padding:0 20px 40px;max-height:90dvh;overflow-y:auto;animation:sheetup .28s cubic-bezier(.4,0,.2,1);}
.weights-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.weights-row:last-of-type{border-bottom:none;}
.weights-icon{width:32px;height:32px;border-radius:9px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.weights-name{flex:1;font-size:13px;font-weight:500;color:#f0f0f5;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.weights-bar-wrap{width:80px;height:4px;background:#1c1c27;border-radius:4px;overflow:hidden;flex-shrink:0;}
.weights-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#4f7fff,#a855f7);transition:width .3s ease;}
.weights-pct{font-size:13px;font-weight:700;color:#f0f0f5;min-width:34px;text-align:right;flex-shrink:0;}
.weights-input{width:52px;background:#1c1c27;border:1px solid rgba(255,255,255,0.08);border-radius:7px;font-family:'Geist',-apple-system,sans-serif;font-size:14px;font-weight:700;color:#f0f0f5;padding:5px 8px;outline:none;text-align:center;-webkit-text-fill-color:#f0f0f5;transition:border-color .15s;}
.weights-input:focus{border-color:rgba(168,85,247,0.5);}
.weights-pct-sign{font-size:13px;color:#8585a0;flex-shrink:0;}
.weights-total{display:flex;justify-content:space-between;align-items:center;padding:12px 0 0;margin-top:4px;border-top:1px solid rgba(255,255,255,0.08);}
.weights-total-lbl{font-size:12px;color:#8585a0;}
.weights-total-val{font-size:15px;font-weight:700;}
.weights-total-val.ok{color:#00d67a;}
.weights-total-val.err{color:#ff4d6a;}
.weights-btn-row{display:flex;gap:10px;margin-top:14px;}
.fab-settings{position:fixed;bottom:24px;left:20px;width:48px;height:48px;background:linear-gradient(135deg,rgba(168,85,247,0.25),rgba(79,127,255,0.25));border:1px solid rgba(168,85,247,0.45);color:#c084fc;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(168,85,247,0.25),0 2px 8px rgba(0,0,0,0.4);z-index:200;transition:all .2s cubic-bezier(.34,1.56,.64,1);-webkit-tap-highlight-color:transparent;}
.fab-settings:hover{transform:scale(1.08);background:linear-gradient(135deg,rgba(168,85,247,0.4),rgba(79,127,255,0.4));box-shadow:0 6px 28px rgba(168,85,247,0.4),0 2px 8px rgba(0,0,0,0.4);color:#e9d5ff;}
.fab{position:fixed;bottom:24px;right:20px;background:linear-gradient(135deg,#4f7fff,#a855f7);color:#fff;border:none;border-radius:50px;padding:14px 22px;font-family:'Geist',-apple-system,sans-serif;font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(79,127,255,0.35),0 2px 8px rgba(0,0,0,0.4);z-index:200;transition:transform .2s,box-shadow .2s;-webkit-tap-highlight-color:transparent;}
.fab:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(79,127,255,0.45),0 4px 12px rgba(0,0,0,0.4);}

/* CONTEXT MENU */
.ctx-menu{position:fixed;background:#1c1c27;border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:4px;z-index:500;min-width:148px;box-shadow:0 8px 32px rgba(0,0,0,0.65);animation:menuPop .15s cubic-bezier(.34,1.56,.64,1);}
@keyframes menuPop{from{opacity:0;transform:scale(.92);}to{opacity:1;transform:scale(1);}}
.ctx-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;font-family:'Geist',-apple-system,sans-serif;font-size:13px;font-weight:500;color:#f0f0f5;cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:background .12s;}
.ctx-item:hover{background:rgba(255,255,255,0.07);}
.ctx-item.danger{color:#ff4d6a;}
.ctx-item.danger:hover{background:rgba(255,77,106,0.12);}
.ctx-div{height:1px;background:rgba(255,255,255,0.05);margin:3px 6px;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px);}
.sheet{background:#16161f;border:1px solid rgba(255,255,255,0.08);border-radius:24px 24px 0 0;width:100%;max-width:600px;padding:0 20px 40px;animation:sheetup .28s cubic-bezier(.4,0,.2,1);}
@keyframes sheetup{from{transform:translateY(80px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.sheet-pill{width:40px;height:4px;background:rgba(255,255,255,0.08);border-radius:4px;margin:14px auto 22px;}
.sheet-title{font-size:18px;font-weight:700;letter-spacing:-.4px;color:#fff;margin-bottom:16px;}
.sheet-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:#8585a0;margin-bottom:6px;}
.sheet-input{width:100%;background:#1c1c27;border:1px solid rgba(255,255,255,0.08);border-radius:10px;font-family:'Geist',-apple-system,sans-serif;font-size:16px;color:#f0f0f5;padding:13px 14px;outline:none;margin-bottom:16px;transition:border-color .15s,box-shadow .15s;}
.sheet-input:focus{border-color:rgba(168,85,247,0.5);box-shadow:0 0 0 3px rgba(168,85,247,0.1);}
.icon-picker-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:#8585a0;margin-bottom:8px;}
.icon-search-wrap{position:relative;margin-bottom:10px;}
.icon-search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:#4a4a60;pointer-events:none;}
.icon-search{width:100%;background:#1c1c27;border:1px solid rgba(255,255,255,0.08);border-radius:10px;font-family:'Geist',-apple-system,sans-serif;font-size:16px;color:#f0f0f5;padding:9px 12px 9px 32px;outline:none;transition:border-color .15s;}
.icon-search::placeholder{color:#4a4a60;}
.icon-search:focus{border-color:rgba(168,85,247,0.5);}
.icon-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;max-height:180px;overflow-y:auto;padding-right:2px;margin-bottom:14px;}
.icon-btn{aspect-ratio:1;border-radius:9px;background:rgba(255,255,255,0.04);border:1.5px solid transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#8585a0;transition:all .15s;padding:0;}
.icon-btn:hover{background:rgba(255,255,255,0.07);color:#f0f0f5;border-color:rgba(255,255,255,0.08);}
.icon-btn.sel{background:linear-gradient(135deg,rgba(79,127,255,0.2),rgba(168,85,247,0.2));border-color:rgba(168,85,247,0.6);color:#fff;}
.icon-preview{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px 14px;margin-bottom:14px;}
.icon-preview-box{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,rgba(79,127,255,0.15),rgba(168,85,247,0.15));border:1px solid rgba(168,85,247,0.25);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;}
.icon-preview-text{font-size:13px;color:#8585a0;}
.icon-preview-text strong{color:#f0f0f5;font-weight:500;display:block;}
.sheet-btns{display:flex;gap:10px;}
.btn-cancel{flex:1;background:#1c1c27;border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:#8585a0;font-family:'Geist',-apple-system,sans-serif;font-weight:600;font-size:15px;padding:14px;cursor:pointer;}
.btn-confirm{flex:2;background:linear-gradient(135deg,#4f7fff,#a855f7);border:none;border-radius:10px;color:#fff;font-family:'Geist',-apple-system,sans-serif;font-weight:700;font-size:15px;padding:14px;cursor:pointer;}

/* TOAST */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(0);background:#1c1c27;border:1px solid rgba(255,255,255,0.08);color:#f0f0f5;border-radius:50px;padding:9px 20px;font-size:12.5px;font-weight:500;z-index:400;pointer-events:none;box-shadow:0 4px 24px rgba(0,0,0,0.4);white-space:nowrap;max-width:calc(100vw - 40px);}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:#4a4a60;font-size:14px;}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.5;}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.new-item{animation:fadeUp .2s ease forwards;}
@keyframes flashUp{
  0%  {background:rgba(79,127,255,0);transform:translateY(0);}
  25% {background:rgba(79,127,255,0.18);transform:translateY(-3px);}
  75% {background:rgba(79,127,255,0.12);transform:translateY(-1px);}
  100%{background:rgba(79,127,255,0);transform:translateY(0);}
}
@keyframes flashDown{
  0%  {background:rgba(168,85,247,0);transform:translateY(0);}
  25% {background:rgba(168,85,247,0.18);transform:translateY(3px);}
  75% {background:rgba(168,85,247,0.12);transform:translateY(1px);}
  100%{background:rgba(168,85,247,0);transform:translateY(0);}
}
.item-flash-up{animation:flashUp .4s cubic-bezier(.34,1.56,.64,1) forwards;}
.item-flash-down{animation:flashDown .4s cubic-bezier(.34,1.56,.64,1) forwards;}
.sec-flash-up{animation:flashUp .45s cubic-bezier(.34,1.56,.64,1) forwards;}

const SK = 'apt_infinito_react_v1';
const uid = () => '_' + Math.random().toString(36).slice(2, 9);
const fmt = n => n ? 'L ' + Number(n).toLocaleString('es-HN', {minimumFractionDigits:0,maximumFractionDigits:0}) : 'L 0';
const fmtInput = n => n ? Math.round(n).toLocaleString('es-HN') : '';

function secStats(s) {
  let t=0,d=0,b=0,p=0,et=0,ed=0;
  for (const g of s.groups) {
    const ess = g.label === 'Esenciales';
    for (const it of g.items) {
      t++; if(it.done) d++;
      b += parseFloat(it.budget)||0;
      p += parseFloat(it.paid)||0;
      if(ess){et++;if(it.done)ed++;}
    }
  }
  return { total:t, done:d, pct:t?Math.round(d/t*100):0, budget:b, paid:p, essComplete:et>0&&ed===et };
}

function globalStats(sections) {
  let t=0,d=0,b=0,p=0,weightedPct=0;
  const totalWeight = sections.reduce((s,x)=>s+(x.weight||10),0)||1;
  for (const s of sections){
    const st=secStats(s);
    t+=st.total;d+=st.done;b+=st.budget;p+=st.paid;
    const w=(s.weight||10)/totalWeight;
    weightedPct += st.pct * w;
  }
  return {total:t,done:d,pct:Math.round(weightedPct),budget:b,paid:p,secs:sections.length};
}

function migrateState(s) {
  if (!s || !Array.isArray(s.sections)) return JSON.parse(JSON.stringify(DEFAULTS));
  for (const sec of s.sections) {
    if (!sec.icon) sec.icon = 'home';
    if (sec.weight === undefined) sec.weight = 10;
    if (!Array.isArray(sec.groups)) sec.groups = [];
    for (const g of sec.groups) {
      if (!Array.isArray(g.items)) g.items = [];
      for (const it of g.items) {
        if (it.budget === undefined) it.budget = null;
        if (it.paid   === undefined) it.paid   = null;
      }
    }
  }
  return s;
}

function loadState() {
  // Return defaults — Firebase will override via fbListen
  try {
    const r = localStorage.getItem(SK);
    if (r) return migrateState(JSON.parse(r));
  } catch {}
  return JSON.parse(JSON.stringify(DEFAULTS));
}

  useEffect(() => {
    const handleOutside = (e) => {
      if (menuRef.current && !menuRef.current.contains(e.target)) {
        onClose();
      }
    };
    const timer = setTimeout(() => {
      document.addEventListener('pointerdown', handleOutside);
    }, 50);
    return () => {
      clearTimeout(timer);
      document.removeEventListener('pointerdown', handleOutside);
    };
  }, [onClose]);

  return (
    <div ref={menuRef} className="ctx-menu" style={{ top: y, left: x }}>
      {confirming !== null ? (
        // Inline confirm state
        <div style={{padding:'10px 12px'}}>
          <div style={{fontSize:12,color:'#f0f0f5',marginBottom:10,fontWeight:500}}>
            ¿Confirmar eliminación?
          </div>
          <div style={{display:'flex',gap:6}}>
            <button className="ctx-item" style={{flex:1,justifyContent:'center',background:'rgba(255,255,255,0.05)',borderRadius:7}}
              onPointerDown={e=>e.stopPropagation()}
              onClick={e=>{e.stopPropagation();setConfirming(null);}}>
              Cancelar
            </button>
            <button className="ctx-item danger" style={{flex:1,justifyContent:'center',background:'rgba(255,77,106,0.15)',borderRadius:7}}
              onPointerDown={e=>e.stopPropagation()}
              onClick={e=>{e.stopPropagation();items[confirming].action();onClose();}}>
              Eliminar
            </button>
          </div>
        </div>
      ) : (
        items.map((item, i) =>
          item === 'divider' ? <div key={i} className="ctx-div" /> :
          <button key={i} className={`ctx-item${item.danger?' danger':''}`}
            onPointerDown={e => e.stopPropagation()}
            onClick={e => {
              e.stopPropagation();
              if (item.danger) { setConfirming(i); }
              else { item.action(); onClose(); }
            }}>
            {item.icon && <IconSvg id={item.icon} size={14} />}
            {item.label}
          </button>
        )
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════
   PRICE INPUT
══════════════════════════════════════════════ */
function PriceInput({ value, onChange, tag, tagClass }) {
  const [display, setDisplay] = useState(fmtInput(value));
  useEffect(() => { setDisplay(fmtInput(value)); }, [value]);
  return (
    <div className="pf">
      <span className={`pf-tag ${tagClass}`}>{tag}</span>
      <span className="pf-cur">L</span>
      <input
        className="pf-input"
        type="text"
        inputMode="decimal"
        placeholder="0"
        value={display}
        onClick={e => e.stopPropagation()}
        onFocus={e => { e.stopPropagation(); e.target.select(); }}
        onKeyDown={e => {
          const allowed = ['Backspace','Delete','ArrowLeft','ArrowRight','Tab','Enter','Home','End'];
          if (!allowed.includes(e.key) && !(e.key >= '0' && e.key <= '9')) e.preventDefault();
        }}
        onChange={e => {
          const raw = e.target.value.replace(/[^\d]/g, '');
          const num = raw === '' ? null : parseInt(raw, 10);
          setDisplay(num !== null ? num.toLocaleString('es-HN') : '');
          onChange(num);
        }}
      />
    </div>
  );
}

/* ══════════════════════════════════════════════
   ITEM ROW
══════════════════════════════════════════════ */
function ItemRow({ item, sid, gl, flashDir, onToggle, onUpdatePrice, onDelete, onMove }) {
  const b = parseFloat(item.budget)||0, p = parseFloat(item.paid)||0;
  const diff = p - b;
  const showDiff = b > 0 && p > 0;
  const [ctx, setCtx] = useState(null);

  const openCtx = useCallback((e) => {
    e.stopPropagation();
    const rect = e.currentTarget.getBoundingClientRect();
    setCtx({ x: Math.min(rect.right + 6, window.innerWidth - 162), y: Math.min(rect.top, window.innerHeight - 148) });
  }, []);

  return (
    <div className="item-outer">
      <div className={`item-row${item.done?' done':''}${flashDir===-1?' item-flash-up':flashDir===1?' item-flash-down':''}`}
        onClick={() => onToggle(sid, gl, item.id)}>
        {/* Handle */}
        <div className="item-handle" onClick={e => e.stopPropagation()}>
          <button className="handle-btn" onClick={openCtx}>
            <span className="dot"/><span className="dot"/><span className="dot"/>
          </button>
          {ctx && (
            <CtxMenu x={ctx.x} y={ctx.y} onClose={() => setCtx(null)} items={[
              { label:'Subir', icon:'sun', action:()=>onMove(sid,gl,item.id,-1) },
              { label:'Bajar', icon:'moon', action:()=>onMove(sid,gl,item.id,1) },
              'divider',
              { label:'Eliminar', icon:'trash-2', danger:true, action:()=>onDelete(sid,gl,item.id) },
            ]} />
          )}
        </div>
        {/* Body */}
        <div className="item-body">
          <div className="item-name">{item.name}</div>
          <div className="item-prices" onClick={e => e.stopPropagation()}>
            <PriceInput value={item.budget} tagClass="b" tag="Presup."
              onChange={v => onUpdatePrice(sid, gl, item.id, 'budget', v)} />
            <PriceInput value={item.paid} tagClass="p" tag="Pagado"
              onChange={v => onUpdatePrice(sid, gl, item.id, 'paid', v)} />
            {showDiff && (
              <span className={`diff-badge ${diff>0?'over':'save'}`}>
                {diff>0?'+':'−'}{fmt(Math.abs(diff))}
              </span>
            )}
          </div>
        </div>
        {/* Check */}
        <div className="chk" onClick={e => { e.stopPropagation(); onToggle(sid, gl, item.id); }}>
          {item.done && (
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          )}
        </div>
      </div>
    </div>
  );
}

function AddItem({ sid, gl, onAdd }) {

      )}

  );

/* ══════════════════════════════════════════════
   WEIGHTS MODAL
══════════════════════════════════════════════ */
function WeightsModal({ sections, onClose, onSave }) {
  const [weights, setWeights] = useState(() =>
    Object.fromEntries(sections.map(s => [s.id, s.weight ?? 10]))
  );

  const total = Object.values(weights).reduce((a,b) => a + (parseFloat(b)||0), 0);
  const isValid = Math.round(total) === 100;

  const setW = (sid, val) => {
    const num = val === '' ? '' : Math.max(0, Math.min(100, parseFloat(val)||0));
    setWeights(prev => ({ ...prev, [sid]: num }));
  };

  const autoBalance = () => {
    // Distribute remaining weight equally among unlocked sections
    const n = sections.length;
    const base = Math.floor(100 / n);
    const rem  = 100 - base * n;
    const newW = {};
    sections.forEach((s, i) => { newW[s.id] = base + (i < rem ? 1 : 0); });
    setWeights(newW);
  };

  return (
    <div className="weights-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="weights-sheet">
        <div className="sheet-pill"/>
        <div className="sheet-title">⚙ Configuración</div>
        <div style={{fontSize:13,fontWeight:600,color:'#8585a0',marginBottom:8,marginTop:4,textTransform:'uppercase',letterSpacing:1}}>Peso por sección</div>
        <div style={{fontSize:12,color:'#8585a0',marginBottom:16,lineHeight:1.5}}>
          Define cuánto influye cada sección en el avance global. Debe sumar 100%.
        </div>

        {sections.map(s => (
          <div className="weights-row" key={s.id}>
            <div className="weights-icon"><IconSvg id={s.icon||'home'} size={15}/></div>
            <div className="weights-name">{s.name}</div>
            <div className="weights-bar-wrap">
              <div className="weights-bar-fill" style={{width:`${Math.min(100,weights[s.id]||0)}%`}}/>
            </div>
            <input
              className="weights-input"
              type="text" inputMode="decimal"
              value={weights[s.id]}
              onFocus={e => e.target.select()}
              onChange={e => setW(s.id, e.target.value)}
              onKeyDown={e => {
                const ok = ['Backspace','Delete','ArrowLeft','ArrowRight','Tab','.',','];
                if(!ok.includes(e.key) && !(e.key>='0'&&e.key<='9')) e.preventDefault();
              }}
            />
            <span className="weights-pct-sign">%</span>
          </div>
        ))}

        <div className="weights-total">
          <span className="weights-total-lbl">Total</span>
          <span className={`weights-total-val ${isValid?'ok':'err'}`}>
            {isNaN(total)?'–':Math.round(total*10)/10}%
            {isValid ? ' ✓' : ` (faltan ${Math.round((100-total)*10)/10}%)`}
          </span>
        </div>

        <div className="weights-btn-row">
          <button className="btn-cancel" onClick={autoBalance} style={{flex:1,fontSize:13}}>
            Distribuir igual
          </button>
          <button className="btn-cancel" onClick={onClose} style={{flex:1}}>
            Cancelar
          </button>
          <button
            className="btn-confirm"
            style={{flex:2, opacity: isValid?1:0.45, cursor:isValid?'pointer':'not-allowed'}}
            onClick={() => { if(isValid) onSave(weights); }}
          >
            Guardar
          </button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════════ */
function App() {
  const [sections, setSections] = useState(() => loadState().sections);
  const [openSecs, setOpenSecs] = useState(new Set());
  const [showModal, setShowModal] = useState(false);
  const [showWeights, setShowWeights] = useState(false);
  const [toast, setToast] = useState('');
  const [lastMovedSec, setLastMovedSec] = useState(null); // {id, dir}
  const toastRef = useRef(null);

  // Sync state
  const [synced, setSynced] = useState(false);
  const isRemoteRef = useRef(false);  // true when update came from Firebase
  const saveTimerRef = useRef(null);

  // Load from Firebase on mount, then listen for realtime changes
  useEffect(() => {
    // Load once first
    window.fbLoad((val) => {
      if (val && val.sections) {
        isRemoteRef.current = true;
        setSections(migrateState(val).sections);
      }
      setSynced(true);
    });

    // Then listen for changes from other devices
    window.fbListen((val) => {
      if (!val || !val.sections) return;
      const incoming = JSON.stringify(val.sections);
      setSections(prev => {
        if (JSON.stringify(prev) === incoming) return prev; // no change
        isRemoteRef.current = true;
        return migrateState(val).sections;
      });
    });
  }, []);

  // Save to Firebase + localStorage on local changes only
  useEffect(() => {
    if (!synced) return;
    if (isRemoteRef.current) {
      // This change came from Firebase — don't save back
      isRemoteRef.current = false;
      return;
    }
    // Debounce saves by 600ms to batch rapid changes
    clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(() => {
      const data = { sections };
      try { localStorage.setItem(SK, JSON.stringify(data)); } catch {}
      window.fbSave(data);
    }, 600);
  }, [sections, synced]);

  const showToast = useCallback((msg) => {
    setToast(msg);
    clearTimeout(toastRef.current);
    toastRef.current = setTimeout(() => setToast(''), 2200);
  }, []);

  const g = globalStats(sections);

  // ─── Section actions ───
  const toggleSec = useCallback((sid) => {
    setOpenSecs(prev => {
      const n = new Set(prev);
      n.has(sid) ? n.delete(sid) : n.add(sid);
      return n;
    });
  }, []);

  const moveSec = useCallback((sid, dir) => {
    setLastMovedSec({id: sid, dir});
    setTimeout(() => setLastMovedSec(null), 500);
    setSections(prev => {
      const arr = [...prev];
      const idx = arr.findIndex(x => x.id === sid);
      const ni = idx + dir;
      if (ni < 0 || ni >= arr.length) return prev;
      [arr[idx], arr[ni]] = [arr[ni], arr[idx]];
      return arr;
    });
  }, []);

  const deleteSec = useCallback((sid) => {
    setSections(prev => {
      const next = prev.filter(s => s.id !== sid);
      if (next.length === 0) return next;
      const n = next.length;
      const base = Math.floor(100 / n);
      const rem  = 100 - base * n;
      return next.map((s, i) => ({ ...s, weight: base + (i < rem ? 1 : 0) }));
    });
    showToast('Sección eliminada');
  }, [showToast]);

  const saveWeights = useCallback((weights) => {
    setSections(prev => prev.map(s => ({
      ...s, weight: parseFloat(weights[s.id]) || 10
    })));
    setShowWeights(false);
    showToast('Pesos actualizados');
  }, [showToast]);

  const addSec = useCallback((name, icon) => {
    const ns = { id: uid(), icon, name, weight: 10,
      groups: [{ label:'Esenciales', items:[] }, { label:'Complementarios', items:[] }] };
    setSections(prev => {
      const next = [...prev, ns];
      // Redistribute weights equally so they always sum to 100
      const n = next.length;
      const base = Math.floor(100 / n);
      const rem  = 100 - base * n;
      return next.map((s, i) => ({ ...s, weight: base + (i < rem ? 1 : 0) }));
    });
    setOpenSecs(prev => new Set([...prev, ns.id]));
    setShowModal(false);
    showToast(`✨ ${name} creada`);
  }, [showToast]);

  // ─── Item actions ───
  const updateItem = useCallback((sid, gl, iid, fieldOrToggle, val) => {
    setSections(prev => prev.map(s => {
      if (s.id !== sid) return s;
      return { ...s, groups: s.groups.map(g => {
        if (g.label !== gl) return g;
        return { ...g, items: g.items.map(it => {
          if (it.id !== iid) return it;
          if (fieldOrToggle === 'budget' || fieldOrToggle === 'paid')
            return { ...it, [fieldOrToggle]: val };
          // toggle done
          const done = !it.done;
          if (done) showToast(`✓ ${it.name}`);
          return { ...it, done };
        })};
      })};
    }));
  }, [showToast]);

  const deleteItem = useCallback((sid, gl, iid) => {
    setSections(prev => prev.map(s => {
      if (s.id !== sid) return s;
      return { ...s, groups: s.groups.map(g => {
        if (g.label !== gl) return g;
        return { ...g, items: g.items.filter(it => it.id !== iid) };
      })};
    }));
    showToast('Eliminado');
  }, [showToast]);

  const moveItem = useCallback((sid, gl, iid, dir) => {
    setSections(prev => prev.map(s => {
      if (s.id !== sid) return s;
      return { ...s, groups: s.groups.map(g => {
        if (g.label !== gl) return g;
        const items = [...g.items];
        const idx = items.findIndex(x => x.id === iid);
        const ni = idx + dir;
        if (ni < 0 || ni >= items.length) return g;
        [items[idx], items[ni]] = [items[ni], items[idx]];
        return { ...g, items };
      })};
    }));
  }, []);

  const deleteGroup = useCallback((sid, gl) => {
    setSections(prev => prev.map(s => {
      if (s.id !== sid) return s;
      return { ...s, groups: s.groups.filter(g => g.label !== gl) };
    }));
    showToast(`Subsección eliminada`);
  }, [showToast]);

  const addGroup = useCallback((sid, label) => {
    setSections(prev => prev.map(s => {
      if (s.id !== sid) return s;
      if (s.groups.find(g => g.label === label)) return s; // no duplicates
      return { ...s, groups: [...s.groups, { label, items: [] }] };
    }));
    showToast(`+ ${label}`);
  }, [showToast]);

  const addItem = useCallback((sid, gl, name) => {
    const it = { id: uid(), name, done: false, budget: null, paid: null };
    setSections(prev => prev.map(s => {
      if (s.id !== sid) return s;
      return { ...s, groups: s.groups.map(g => {
        if (g.label !== gl) return g;
        return { ...g, items: [...g.items, it] };
      })};
    }));
    showToast(`+ ${name}`);
  }, [showToast]);

  return (
    <>
      <div className="app">
        {/* HEADER */}
        <header className="hd">
          <div className="hd-inner">
            <div className="hd-top">
              <div className="hd-titles">
                <div className="hd-eyebrow" style={{display:'flex',alignItems:'center',gap:6}}>
              Proyecto · Amueblamiento
              <span style={{
                display:'inline-flex',alignItems:'center',gap:3,
                fontSize:9,fontWeight:600,letterSpacing:.5,
                color: synced ? '#00d67a' : '#ffb341',
                background: synced ? 'rgba(0,214,122,0.1)' : 'rgba(255,179,65,0.1)',
                border: `1px solid ${synced ? 'rgba(0,214,122,0.2)' : 'rgba(255,179,65,0.2)'}`,
                borderRadius:50,padding:'1px 6px'
              }}>
                <span style={{width:5,height:5,borderRadius:'50%',background: synced ? '#00d67a' : '#ffb341',display:'inline-block'}}/>
                {synced ? 'Sincronizado' : 'Conectando…'}
              </span>
            </div>
                <div className="hd-title">Apartamento, <span>Torre Infinito</span></div>
              </div>
              <div className="ring-block">
                <GlobalRing pct={g.pct} />
                <div className="pct-col">
                  <div className="pct-big">{g.pct}%</div>
                  <div className="pct-sub">{g.done} de {g.total} ítems</div>
                </div>
              </div>
            </div>
            <div className="prog-bar">
              <div className="prog-fill" style={{width:`${g.pct}%`}}/>
            </div>
            <div className="metrics">
              <div className="metric"><div className="metric-lbl">Hecho</div><div className="metric-val g">{g.done}</div></div>
              <div className="metric"><div className="metric-lbl">Pend.</div><div className="metric-val">{g.total-g.done}</div></div>

              <div className="metric"><div className="metric-lbl">Presup.</div><div className="metric-val b">{fmt(g.budget)}</div></div>
              <div className="metric"><div className="metric-lbl">Gastado</div><div className={`metric-val ${g.paid>g.budget&&g.budget>0?'r':'g'}`}>{fmt(g.paid)}</div></div>
            </div>
          </div>
        </header>

        <div className="sec-divider">Secciones</div>

        {/* SECTIONS */}
        {sections.length === 0 ? (
          <div className="empty">
            <div className="empty-icon">📋</div>
            Sin secciones. Agrega una con el botón +
          </div>
        ) : sections.map(s => (
          <SectionCard key={s.id} section={s} isOpen={openSecs.has(s.id)}
            flashDir={lastMovedSec && lastMovedSec.id === s.id ? lastMovedSec.dir : null}
            onToggle={toggleSec}
            onUpdateItem={updateItem}
            onDeleteItem={deleteItem}
            onMoveItem={moveItem}
            onAddItem={addItem}
            onDeleteSec={deleteSec}
            onMoveSec={moveSec}
            onDeleteGroup={deleteGroup}
            onAddGroup={addGroup}
          />
        ))}
      </div>

      {/* Settings FAB */}
      <button className="fab-settings" onClick={() => setShowWeights(true)} title="Configurar pesos">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>

      {/* FAB */}
      <button className="fab" onClick={() => setShowModal(true)}>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Nueva sección
      </button>

      {/* MODAL */}
      {showModal && <NewSectionModal onClose={() => setShowModal(false)} onConfirm={addSec} />}

      {/* WEIGHTS MODAL */}
      {showWeights && <WeightsModal sections={sections} onClose={() => setShowWeights(false)} onSave={saveWeights} />}

      {/* TOAST */}
      <Toast msg={toast} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  </script>
</body>
</html>
